<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROUNZ | 회원가입</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/signup.css" />
  </head>
  <body>
    <!-- 회원가입 - 최예빈 -->
    <header id="header"></header>

    <main class="signup-main">
      <div class="signup-card">
        <h1 class="signup-heading">회원가입</h1>
        <p class="signup-subheading">ROUNZ에 가입하고 완벽한 아이웨어를 만나보세요</p>

        <form id="signup-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="signup-username">사용자명</label>
            <input
              id="signup-username"
              class="form-input"
              type="text"
              placeholder="사용자명을 입력하세요"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-name">이름</label>
            <input
              id="signup-name"
              class="form-input"
              type="text"
              placeholder="이름을 입력하세요"
              autocomplete="name"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-email">이메일</label>
            <input
              id="signup-email"
              class="form-input"
              type="email"
              placeholder="이메일을 입력하세요"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-tel">전화번호</label>
            <input
              id="signup-tel"
              class="form-input"
              type="tel"
              placeholder="010-1234-5678"
              autocomplete="tel"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-password">비밀번호</label>
            <input
              id="signup-password"
              class="form-input"
              type="password"
              placeholder="안전한 비밀번호를 입력하세요"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="signup-password-confirm">비밀번호 확인</label>
            <input
              id="signup-password-confirm"
              class="form-input"
              type="password"
              placeholder="비밀번호를 다시 입력하세요"
              autocomplete="new-password"
              required
            />
          </div>

          <p class="terms-text">
            <a href="#" class="terms-link">이용약관</a> 및
            <a href="#" class="terms-link">개인정보처리방침</a>에 동의합니다
          </p>

          <button type="submit" class="btn-signup">회원가입</button>
        </form>

        <p class="login-row">
          이미 계정이 있으신가요?&nbsp;
          <a href="./login.html" class="login-link">로그인</a>
        </p>
      </div>
    </main>

    <footer id="footer"></footer>

    <script type="module" src="./js/common.js"></script>
    <script type="module" src="./js/signup.js"></script>
  </body>
</html>

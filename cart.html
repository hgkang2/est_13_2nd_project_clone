<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/cart.css" />
  </head>
  <body>
    <header id="header"></header>
    <main class="cart-page">
      <h2 class="cart-title">장바구니</h2>

      <!-- ── Empty State ── -->
      <div class="cart-empty" id="cartEmpty">
        <svg
          class="cart-empty__icon"
          viewBox="0 0 56 56"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M14 14h4l4 20h18l4-14H18"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="24" cy="38" r="2.5" fill="currentColor" />
          <circle cx="36" cy="38" r="2.5" fill="currentColor" />
          <path d="M10 10l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <p class="cart-empty__title">장바구니가 비어있습니다</p>
        <p class="cart-empty__desc">마음에 드는 상품을 장바구니에 담아보세요</p>
        <button class="cart-empty__btn" id="goShoppingBtn">쇼핑 계속하기</button>
      </div>

      <!-- ── Filled State ── -->
      <div class="cart-filled hidden" id="cartFilled">
        <!-- Items Column -->
        <div class="cart-items">
          <div class="cart-items__header">
            <label class="cart-items__select-all">
              <input type="checkbox" id="selectAll" checked />
              <span
                >전체 선택 (<span id="checkedCount">1</span>/<span id="totalCount">1</span>)</span
              >
            </label>
            <button class="cart-items__delete-selected" id="deleteSelected">선택삭제</button>
          </div>

          <!-- Item list -->
          <div id="itemList"></div>

          <div class="cart-notice">
            <p>구매하기는 상품을 보다 안전하게 보호합니다.</p>
            <p>국가/지역에 따라 상품에 제한이 있을 수 있으며 구매 완료 후 취소는 불가합니다.</p>
          </div>
        </div>

        <!-- Summary Column -->
        <aside class="cart-summary">
          <h2 class="cart-summary__title">결제 예정 금액</h2>
          <div class="cart-summary__row">
            <span class="label">총 상품 금액</span>
            <span class="value" id="subtotalValue">0원</span>
          </div>
          <div class="cart-summary__row">
            <span class="label">배송비</span>
            <span class="value value--free">무료 배송</span>
          </div>
          <div class="cart-summary__row">
            <span class="label">상품 할인 혜택</span>
            <span class="value value--discount" id="discountValue">-0원</span>
          </div>
          <div class="cart-summary__total">
            <span class="label">최종 결제 금액</span>
            <span class="value" id="totalValue">0원</span>
          </div>
          <button class="cart-summary__btn" id="checkoutBtn">0개 상품 주문하기</button>
        </aside>
      </div>
    </main>
    <footer id="footer"></footer>
    <script src="./js/cart.js"></script>
    <script type="module" src="./js/common.js"></script>
  </body>
</html>

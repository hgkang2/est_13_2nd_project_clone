<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROUNZ - 2차 프로젝트</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <!-- 메인 페이지 - 최수민 & 송민혁-->
    <header id="header"></header>

    <main>
      <section class="hero-section">
        <div class="hero-wrapper">
          <div class="ai-badge">
            <span class="material-symbols-outlined">auto_awesome</span>
            <p>AI-Powered Virtual Fitting</p>
          </div>
          <h1 class="hero-title">
            <p>
              나에게 딱 맞는<br />
              <span class="text-primary">안경 찾기</span>
            </p>
          </h1>
          <p class="hero-desc">
            AI 가상 피팅 기술로 아이웨어 쇼핑의 미래를 경험해 보세요.<br />
            수천 개의 안경테를 착용한 당신의 모습을 지금 즉시 확인할 수 있습니다.
          </p>

          <div class="hero-buttons">
            <button class="btn primary-btn">가상 피팅 시작하기 →</button>
            <button class="btn secondary-btn">컬렉션 둘러보기</button>
          </div>

          <div class="stats">
            <ul class="stats-list">
              <li class="stat-item">
                <strong class="stat-value">5K+</strong>
                <span class="stat-label">Frames</span>
              </li>
              <li class="stat-item">
                <strong class="stat-value">AI</strong>
                <span class="stat-label">Technology</span>
              </li>
              <li class="stat-item">
                <strong class="stat-value">24h</strong>
                <span class="stat-label">Delivery</span>
              </li>
            </ul>
          </div>
        </div>
      </section>

      <section class="product-section">
        <div class="product-wrapper">
          <header class="products-header">
            <div>
              <h2 class="section-title heading-l">신상품</h2>
              <div class="section-desc">
                <p>최신 프리미엄 아이웨어 컬렉션을 만나보세요</p>
                <a href="#">더보기</a>
              </div>
            </div>
          </header>

          <span class="blind">상품 정보를 불러오는 중입니다. 잠시만 기다려주세요.</span>
          <ul class="product-grid" id="new-product-grid"></ul>
        </div>
      </section>

      <section class="product-section all-eyewear">
        <div class="product-wrapper">
          <div class="section-header">
            <h2 class="section-title heading-l">전체 아이웨어</h2>
            <p class="section-subtitle">ROUNZ의 모든 아이웨어를 만나보세요</p>
          </div>

          <ul class="product-grid all-eyewear"></ul>
          <button type="button" class="more-btn">더보기</button>
        </div>
      </section>
    </main>
    <!-- footer 송민혁 -->
    <footer id="footer"></footer>
    <script type="module" src="./js/common.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
